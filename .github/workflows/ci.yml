name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deny-all by default; each job opts into the least privilege it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Format check (ruff)
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Type check (ty)
        run: uv run --python ${{ matrix.python-version }} ty check

      - name: Tests (pytest)
        run: uv run --python ${{ matrix.python-version }} pytest

  # Static-analysis security audit of the workflow files themselves.
  # Runs via uvx (no project dependency, no extra runtime). --offline needs no token.
  # Threshold is medium (persona: regular) and can be tightened later; the gating step
  # must NOT use --format sarif (SARIF always exits 0 even with findings).
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Audit workflows (zizmor)
        run: >-
          uvx zizmor@1.26.1
          --offline
          --persona regular
          --min-severity medium
          --format github
          .github/workflows/
