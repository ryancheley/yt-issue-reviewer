name: Release

# Build and publish to PyPI when a version tag (vX.Y.Z) is pushed.
# Publishing uses PyPI Trusted Publishing (OIDC) — no stored token. TestPyPI is a
# dry-run gate before the real PyPI publish. See docs/releasing.md for the one-time
# Trusted Publisher setup (this workflow cannot create that; it's a maintainer action).
on:
  push:
    tags:
      - "v*"

# Deny-all by default; each job opts into the least privilege it needs.
permissions: {}

jobs:
  # Stage 0: fail fast if the tag doesn't match the package version. Guards against
  # tagging (e.g. v0.1.1) without bumping the version in pyproject.toml, which would
  # otherwise build the old version and hit a confusing "File already exists" on PyPI.
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pkg. Bump the version and re-tag."
            exit 1
          fi

  # Stage 1: publish to TestPyPI first to catch metadata/upload problems.
  testpypi:
    needs: verify
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # Stage 2: publish to PyPI and create the GitHub Release (only after TestPyPI succeeds).
  pypi:
    needs: testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
