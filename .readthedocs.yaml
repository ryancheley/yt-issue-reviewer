# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

# Build documentation in the "docs/" directory with Sphinx (Markdown via MyST)
sphinx:
  configuration: docs/conf.py

# Install the docs build dependencies (Sphinx, MyST, theme).
# The project itself is NOT installed — the docs are hand-authored Markdown and do
# not import the package (which requires Python 3.14).
python:
  install:
    - requirements: docs/requirements.txt
